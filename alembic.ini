# ─────────────────────────────────────────────────────────────────────────────
# Alembic configuration.
# The database URL is NOT set here; `alembic/env.py` injects it from
# `src/config/settings.py` so we have a single source of truth.
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
timezone = UTC

# Migration filenames: 0001_initial_schema.py, 0002_add_xyz.py, …
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 60

# Run ruff on the migration file right after generation — keeps autogenerated
# code in the same style as the rest of the codebase.
[post_write_hooks]
hooks = ruff_format ruff_fix
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_fix.type = console_scripts
ruff_fix.entrypoint = ruff
ruff_fix.options = check --fix REVISION_SCRIPT_FILENAME

# ── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
